<script>
// ---------------- READ MORE ----------------
document.querySelector(".read-more-btn").addEventListener("click", function(){
  const more = document.getElementById("moreContent");
  if(!more.style.display || more.style.display==="none"){
    more.style.display="block"; this.textContent="Download PDF Manual";
  } else { window.location.href="https://payhip.com/YOUR-LINK-HERE"; }
});

// ---------------- THEME TOGGLE ----------------
const themeBtn = document.getElementById("themeToggleBtn");
themeBtn.addEventListener("click", ()=>{ document.body.classList.toggle("dark"); });

// ---------------- POLYGON BACKGROUND ----------------
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const particles = [];
for(let i=0;i<80;i++){
    particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, vx:(Math.random()-0.5)*1.2, vy:(Math.random()-0.5)*1.2, size:Math.random()*3+1});
}
function drawPolygons(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=0;i<particles.length;i++){
        for(let j=i+1;j<particles.length;j++){
            const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, dist=Math.sqrt(dx*dx+dy*dy);
            if(dist<120){
                ctx.beginPath();
                ctx.strokeStyle = document.body.classList.contains('dark') ? 'rgba(163,240,240,'+(1-dist/120)+')':'rgba(0,204,204,'+(1-dist/120)+')';
                ctx.moveTo(particles[i].x,particles[i].y);
                ctx.lineTo(particles[j].x,particles[j].y);
                ctx.stroke(); ctx.closePath();
            }
        }
    }
    for(let i=0;i<particles.length;i++){
        let p=particles[i]; ctx.beginPath();
        ctx.fillStyle = document.body.classList.contains('dark')?'rgba(163,240,240,0.8)':'rgba(0,204,204,0.8)';
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0||p.x>canvas.width)p.vx*=-1;
        if(p.y<0||p.y>canvas.height)p.vy*=-1;
    }
    requestAnimationFrame(drawPolygons);
}
drawPolygons();

// ---------------- MODAL BUBBLES ----------------
const modalBubbleCanvas = document.getElementById('modalBubbleCanvas');
const mbCtx = modalBubbleCanvas.getContext('2d');
modalBubbleCanvas.width = window.innerWidth; modalBubbleCanvas.height = window.innerHeight;
const bubbles = [];
for(let i=0;i<40;i++){ bubbles.push({x:Math.random()*modalBubbleCanvas.width, y:Math.random()*modalBubbleCanvas.height, radius:Math.random()*6+2, vy:Math.random()*0.3+0.1}); }
function drawBubbles(){
    mbCtx.clearRect(0,0,modalBubbleCanvas.width,modalBubbleCanvas.height);
    for(let b of bubbles){
        mbCtx.fillStyle='rgba(128,224,224,0.05)';
        mbCtx.beginPath();
        mbCtx.arc(b.x,b.y,b.radius,0,Math.PI*2); mbCtx.fill();
        b.y -= b.vy; if(b.y<0) b.y=modalBubbleCanvas.height;
    }
    requestAnimationFrame(drawBubbles);
}
drawBubbles();

// ---------------- MODAL ----------------
const topicButtons=document.querySelectorAll(".topic-button");
const modal=document.getElementById("topicModal");
const modalTitle=document.getElementById("modalTitle");
const modalContent=document.getElementById("modalContent");
const modalReadMore=document.getElementById("modalReadMore");
const modalCloseBtn=document.getElementById("modalCloseBtn");

function openModal(btn){
  modal.style.display="block";
  modalTitle.textContent=btn.textContent;
  modalContent.textContent=btn.getAttribute("data-content");
}
topicButtons.forEach(btn=>{
  btn.addEventListener("click", ()=>{
    if(modal.style.display==="block" && modalTitle.textContent===btn.textContent){
      modal.style.display="none"; return;
    }
    openModal(btn);
    modalReadMore.onclick=()=>{ alert("Redirect to full page for "+btn.textContent); }
  });
});
modalCloseBtn.addEventListener("click", ()=>{ modal.style.display="none"; });
</script>
